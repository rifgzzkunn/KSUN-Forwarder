- name: Get release + send
  run: |
    curl -s https://api.github.com/repos/tiann/KernelSU/releases/latest > release.json

    TAG=$(jq -r '.tag_name // empty' release.json)
    NAME=$(jq -r '.name // empty' release.json)
    URL=$(jq -r '.html_url // empty' release.json)

    # FIX KUNCI: BODY HARUS DIPAKSA AMAN
    BODY=$(jq -r '.body // ""' release.json | sed 's/"/\\"/g' | head -c 1000)

    if [ -z "$TAG" ]; then
      echo "API ERROR / NO RELEASE"
      cat release.json
      exit 0
    fi

    if [ -f last.txt ]; then
      OLD=$(cat last.txt)
    else
      OLD=""
    fi

    if [ "$OLD" = "$TAG" ]; then
      echo "NO NEW RELEASE"
      exit 0
    fi

    TEXT="🔥 KernelSU Release Baru

Name: $NAME
Tag: $TAG

$BODY

Link: $URL"

    curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
      -d chat_id="${{ secrets.CHAT_ID }}" \
      -d text="$TEXT"

    echo "$TAG" > last.txt
